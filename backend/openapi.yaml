openapi: 3.0.1
info:
  title: AgentFactory Execution Engine
  description: Reads .md agent specs and runs them against LLM providers. Supports OpenAI, Groq, Anthropic, and Ollama.
  contact: {}
  version: "0.1.0"
servers:
  - url: http://localhost:8000
tags:
  - name: health
    description: Service health check
  - name: run
    description: Execute agents from spec objects or .md files
  - name: agents
    description: List and parse agent spec files
  - name: webhook
    description: HTTP webhook triggers for agents
paths:

  /:
    get:
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /run:
    post:
      tags: [run]
      summary: Run agent from spec object
      description: Execute an agent using a pre-parsed AgentSpec JSON object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRequest'
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "500":
          description: Execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /run/file:
    post:
      tags: [run]
      summary: Run agent from .md file path
      description: Execute an agent by reading a .md spec file from disk.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunFileRequest'
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Spec parse error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /run/upload:
    post:
      tags: [run]
      summary: Upload and run .md spec
      description: Upload a .md spec file and execute it immediately.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The .md agent spec file
                user_input:
                  type: string
                  default: Hello
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Spec parse error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /run/{agent_name}:
    post:
      tags: [run]
      summary: Run named agent
      description: Run a named agent from the factory_agent/ directory.
      parameters:
        - name: agent_name
          in: path
          required: true
          description: Agent file name without .md extension
          schema:
            type: string
            example: tune_agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedRunRequest'
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /parse:
    post:
      tags: [agents]
      summary: Parse .md spec file
      description: Parse a .md spec file and return the structured spec without executing it.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The .md agent spec file to parse
      responses:
        "200":
          description: Parsed spec
          content:
            application/json:
              schema:
                type: object
                properties:
                  spec:
                    type: object
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Parse error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /agents:
    get:
      tags: [agents]
      summary: List available agents
      description: List all .md agent specs in the factory_agent/ directory.
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSummary'

  /webhook/{agent_name}:
    post:
      tags: [webhook]
      summary: Webhook trigger for named agent
      description: >
        Trigger a named agent via HTTP webhook. The JSON payload is interpolated
        into the agent's prompt template using ${http:payload.field} syntax.
        Signature verified via X-Hub-Signature-256 or X-Signature header.
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
        - name: X-Hub-Signature-256
          in: header
          required: false
          schema:
            type: string
          description: HMAC-SHA256 signature (sha256=<hex>)
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Any JSON payload interpolated into the agent prompt
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "400":
          description: Invalid JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhook:
    post:
      tags: [webhook]
      summary: Webhook trigger with inline spec
      description: Trigger an agent with an inline spec and payload in the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec, payload]
              properties:
                spec:
                  $ref: '#/components/schemas/AgentSpec'
                payload:
                  type: object
                  description: Webhook payload passed to the agent
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Parse error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: running
        service:
          type: string
          example: AgentFactory Execution Engine
        version:
          type: string
          example: 0.1.0

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string

    AgentModel:
      type: object
      required: [provider, name]
      properties:
        provider:
          type: string
          example: groq
        name:
          type: string
          example: llama-3.3-70b-versatile
        temperature:
          type: number
          default: 0.7
        base_url:
          type: string
          nullable: true
        authentication:
          type: object
          properties:
            type:
              type: string
              enum: [api-key, bearer, none]
            api_key:
              type: string
              nullable: true

    AgentSpec:
      type: object
      required: [model]
      properties:
        name:
          type: string
          example: My Agent
        description:
          type: string
        version:
          type: string
          example: 0.1.0
        max_iterations:
          type: integer
          default: 5
        execution_mode:
          type: string
          enum: [sequential, agentic]
          default: sequential
        model:
          $ref: '#/components/schemas/AgentModel'
        role:
          type: string
        instructions:
          type: string
        output_format:
          type: string
          enum: [json, markdown, plain, html]
          default: json
        json_output_template:
          type: string
          nullable: true
        enforcement:
          type: string
          nullable: true

    RunRequest:
      type: object
      required: [spec, user_input]
      properties:
        spec:
          $ref: '#/components/schemas/AgentSpec'
        user_input:
          type: string
          example: What is the weather in Colombo?
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          default: []

    RunFileRequest:
      type: object
      required: [file_path, user_input]
      properties:
        file_path:
          type: string
          example: /app/factory_agent/tune_agent.md
        user_input:
          type: string
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          default: []

    NamedRunRequest:
      type: object
      required: [user_input]
      properties:
        user_input:
          type: string
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          default: []

    RunResponse:
      type: object
      properties:
        content:
          type: string
          description: The agent's response text
        iterations:
          type: integer
          example: 1
        tool_calls:
          type: array
          items:
            type: object
        finish_reason:
          type: string
          example: stop

    AgentSummary:
      type: object
      properties:
        name:
          type: string
          example: tune_agent
        file:
          type: string
          example: tune_agent.md
        spec_name:
          type: string
          example: AgentFactory Tune Agent
        description:
          type: string
        version:
          type: string
          example: 0.1.0
        model:
          type: string
          example: llama-3.3-70b-versatile
        interfaces:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          example: error message
